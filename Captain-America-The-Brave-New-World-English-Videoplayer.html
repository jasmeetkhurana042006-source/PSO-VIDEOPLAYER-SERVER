  /* SIDEBAR */
  .sidebar{
    position:fixed;
    top:64px;

    border-right:1px solid rgba(255,255,255,0.16);
  }

  .sidebar.active{
    left:0;
  }

  .sidebar-inner{
    padding:0;
  }

  .sidebar-title{
    display:none;
  }

  .sidebar a,
  .dropdown-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    min-height:74px;
    padding:0 22px;
    color:#fff;
    text-decoration:none;
    font-size:17px;
    font-weight:700;
    letter-spacing:0.5px;
    text-transform:uppercase;
    background:#000;
    border:none;
    outline:none;
    cursor:pointer;

  .dropdown-btn span:last-child{
    font-size:15px;
    color:#fff;
    transition:transform 0.25s ease;
  }

  .dropdown-btn.active span:last-child{
    transform:rotate(180deg);
  }

  .submenu{
    display:none;
    background:#0d0d0d;
  }

  .submenu a{
    min-height:56px;
    padding:0 32px;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.4px;
    color:#dcdcdc;
    text-transform:uppercase;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }

  .submenu.show{
    display:block;
  }

  .overlay{
    position:fixed;
    top:64px;
    left:0;
    width:100%;
    height:calc(100vh - 64px);
    background:rgba(0,0,0,0.28);
    display:none;
    z-index:998;
  }

  .overlay.active{
    display:block;
  }

  .marvel-poster {
    position: relative;
    overflow: hidden;
  }

  .marvel-poster img {
    transition: transform 0.4s ease;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: 0.4s ease;
  }

  .play-btn {
    transform: scale(0.8);
    transition: 0.3s ease;
  }

  .marvel-card:hover .play-overlay {
    opacity: 1;
  }

  .marvel-card:hover img {
    transform: scale(1.08);
  }

  .marvel-card:hover .play-btn {
    transform: scale(1);
  }

  /* VIDEO PLAYER STYLING */
  .video-player {
    position: relative;
    width: 100%;
    max-width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    user-select: none;
  }

  .video-player video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #000;
  }

  .video-player::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.4),
      transparent 22%,
      transparent 70%,
      rgba(0, 0, 0, 0.7)
    );
    pointer-events: none;
    z-index: 1;
  }

  .video-title {
    position: absolute;
    top: 16px;
    left: 18px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    z-index: 8;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    transition: opacity 0.25s ease;
  }

  .center-controls {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 34px;
    z-index: 8;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }

  .center-btn {
    pointer-events: auto;
    width: 74px;
    height: 74px;
    border: none;
    border-radius: 50%;
    background: rgba(18, 18, 18, 0.72);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform 0.2s ease, background 0.2s ease;
    position: relative;
  }

  .center-btn:hover {
    transform: scale(1.08);
    background: rgba(32, 32, 32, 0.88);
  }

  .center-btn svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
    display: block;
  }

  .big-play {
    width: 112px;
    height: 112px;
    background: #e50914;
    box-shadow: 0 10px 30px rgba(229, 9, 20, 0.35);
  }

  .big-play:hover {
    background: #f20d18;
  }

  .big-play svg {
    width: 44px;
    height: 44px;
    margin-left: 3px;
  }

  .seek-badge {
    position: absolute;
    bottom: 10px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    opacity: 0.92;
    pointer-events: none;
  }

  .controls {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9;
    padding: 10px 14px 12px;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .progress-container {
    width: 100%;
    margin-bottom: 8px;
  }

  .progress {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.24);
    cursor: pointer;
    overflow: hidden;
  }

  .progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #e50914;
    border: 2px solid #fff;
    box-shadow: -1000px 0 0 1000px #e50914;
  }

  .progress::-moz-range-track {
    height: 5px;
    background: rgba(255, 255, 255, 0.24);
    border-radius: 999px;
  }

  .progress::-moz-range-thumb {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #e50914;
    border: 2px solid #fff;
    cursor: pointer;
  }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .left-controls,
  .right-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
    position: relative;
  }

  .control-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(1.05);
  }

  .control-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
    display: block;
  }

  .time {
    color: #fff;
    font-size: 14px;
    min-width: 120px;
    letter-spacing: 0.2px;
  }

  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 78px;
    height: 4px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.28);
    cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #fff;
    border: none;
  }

  .volume-slider::-moz-range-thumb {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #fff;
    border: none;
  }

  .hide-ui .controls,
  .hide-ui .video-title,
  .hide-ui .center-controls {
    opacity: 0;
    pointer-events: none;
  }

  .video-player:fullscreen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    max-width: 100vw;
    max-height: 100vh;
    aspect-ratio: auto;
    border-radius: 0;
    overflow: hidden;
    background: #000;
  }

  .video-player:fullscreen video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: calc(100vw + 0px);
    height: calc(100vh + 20px);
    min-width: calc(100vw + 20px);
    min-height: calc(100vh + 20px);
    transform: translate(-50%, -50%);
    object-fit: cover;
  }

  .video-player:-webkit-full-screen video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: calc(100vw + 20px);
    height: calc(100vh + 20px);
    min-width: calc(100vw + 20px);
    min-height: calc(100vh + 20px);
    transform: translate(-50%, -50%);
    object-fit: cover;
    padding-left: 0px;
  }

  .loading-screen {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.88);
    z-index: 20;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 18px;
    color: #fff;
  }

  .spinner {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 5px solid rgba(255, 255, 255, 0.18);
    border-top: 5px solid #e50914;
    animation: spin 1s linear infinite;
  }

  .loading-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .loading-timer {
    font-size: 24px;
    font-weight: 700;
    color: #e50914;
  }

  @keyframes spin {
    100% {
      transform: rotate(360deg);
    }
  }

  .lang-scroll {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    gap: 10px;
    padding: 10px;
    margin-top: 20px;
    scroll-behavior: smooth;
    width: 100%;
    -ms-overflow-style: none;
    scrollbar-width: none;
    align-items: center;
    min-height: 100px;
    padding-left: 10px;
  }

  .lang-scroll::-webkit-scrollbar {
    display: none;
  }

  .details {
    overflow: hidden;
  }

  .lang-scroll a {
    flex: 0 0 auto;
  }

  .lang-scroll button {
    background: #0b0b0b;
    color: white;
    border: 1px solid red;
    transition: 0.3s;
    cursor: pointer;
  }

  .lang-scroll button:hover {
    background: red !important;
    color: white !important;
    border: none !important;
  }

  .lang-scroll button.active {
    background: red !important;
    color: white !important;
    border: none !important;
  }

  #langPopup {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
  }

  .popup-content {
    text-align: center;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .popup-text {
    font-size: 20px;
    margin-top: 15px;
    letter-spacing: 1px;
  }

  /* EPISODES ACCORDION */
  .episodes-section {
    margin-top: -10px;
    padding: 0 10px 10px;
    color: #fff;
  }

  .episodes-heading {
    font-size: 24px;
    margin-bottom: 16px;
  }

  .season-box {
    background: #161a2b;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 14px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
  }

  .season-toggle {
    width: 100%;
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 18px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .season-toggle .arrow {
    font-size: 16px;
    transition: 0.3s ease;
  }

  .season-box.active .season-toggle .arrow {
    transform: rotate(180deg);
  }

  .season-content {
    display: none;
    padding: 0 12px 12px;
  }

  .season-box.active .season-content {
    display: block;
  }

  .episode-item {
    display: flex;
    gap: 12px;
    align-items: center;
    text-decoration: none;
    color: #fff;
    background: #161a2b;
    border-radius: 14px;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: 0.25s ease;
  }

  .episode-item:hover {
    background: #161a2b;
    transform: translateY(-1px);
  }

  .episode-thumb {
    width: 92px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
  }

  .episode-info {
    min-width: 0;
    flex: 1;
  }

  .episode-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
    color: #fff;
    text-decoration: none;
    display: block;
  }

  .episode-runtime {
    font-size: 12px;
    color: #b8b8b8;
    line-height: 1.35;
    display: block;
  }

  .anime-divider{
    height:1px;
    margin:10px 0 20px;
    background:linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
    box-shadow:0 0 8px rgba(255,255,255,0.4);
  }

  @media (max-width:480px){
    .sidebar{
      width:75%;
      left:-75%;
    }

    .sidebar a,
    .dropdown-btn{
      min-height:70px;
      font-size:16px;
      padding:0 18px;
    }

    .submenu a{
      font-size:13px;
      padding:0 28px;
      font-family: "Quantico", sans-serif;
      font-weight:700;
      font-style:normal;
    }
  }

  @media (max-width: 768px) {
    .video-title {
      font-size: 13px;
      top: 12px;
      left: 12px;
    }

    .center-controls {
      gap: 18px;
    }

    .center-btn {
      width: 56px;
      height: 56px;
    }

    .center-btn svg {
      width: 22px;
      height: 22px;
    }

    .big-play {
      width: 82px;
      height: 82px;
    }

    .big-play svg {
      width: 32px;
      height: 32px;
    }

    .control-btn {
      width: 30px;
      height: 30px;
    }

    .control-btn svg {
      width: 16px;
      height: 16px;
    }

    .time {
      font-size: 12px;
      min-width: auto;
    }

    .volume-slider {
      width: 58px;
    }

    .controls {
      padding: 8px 10px 10px;
    }

    .progress {
      height: 4px;
    }

    .spinner {
      width: 58px;
      height: 58px;
    }

    .loading-text {
      font-size: 16px;
    }

    .loading-timer {
      font-size: 22px;
    }
  }
  .video-alert {
  margin: 15px 10px;
  padding: 12px 15px;
  border-radius: 8px;

  background: rgba(255, 0, 0, 0.1);
  border: 1px solid red;

  color: #fff;
  font-size: 13px;
  font-weight: 600;
  text-align: center;

  box-shadow: 0 0 10px rgba(255,0,0,0.4);
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {
    box-shadow: 0 0 5px rgba(255,0,0,0.3);
  }
  to {
    box-shadow: 0 0 15px rgba(255,0,0,0.8);
  }
  }
</style>

    function formatTime(time) {
      if (isNaN(time)) return "0:00";
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function updatePlayIcons() {
      if (!centerPlayIcon || !bottomPlayIcon) return;

      if (video.paused) {

        centerPlayIcon.innerHTML = pauseSVG();
        bottomPlayIcon.innerHTML = pauseSVG();
      }
    }

    function updateVolumeIcon() {
      if (!volumeIcon) return;

      if (video.muted || video.volume === 0) {
        volumeIcon.innerHTML = volumeMuteSVG();
      } else if (video.volume < 0.5) {
        volumeIcon.innerHTML = volumeLowSVG();
      } else {
        volumeIcon.innerHTML = volumeHighSVG();
      }
    }

    function isFullscreenActive() {
      return !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.msFullscreenElement
      );
    }

    function updateFullscreenIcon() {
      if (!fullscreenIcon) return;
      fullscreenIcon.innerHTML = isFullscreenActive() ? fullscreenExitSVG() : fullscreenEnterSVG();

      try {
        await video.play();

        console.log("Play error:", err);

        togglePlay();

    video.addEventListener("click", togglePlay);

    if (backwardBtn) {

        video.currentTime = Math.max(0, video.currentTime - 10);
        showUI();

    if (forwardBtn) {
      forwardBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        if (loadingScreen && loadingScreen.style.display !== "none") return;
        video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
        showUI();
      });

    video.addEventListener("loadedmetadata", () => {
      if (timeDisplay) {
        timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;

      if (video.duration && progressBar) {
        progressBar.value = (video.currentTime / video.duration) * 100;

          try {
            await screen.orientation.lock("landscape");

            console.log("Orientation lock not supported:", e);
          }
        }

      } catch (err) {

      player.classList.remove("hide-ui");

      if (!video.paused && (!loadingScreen || loadingScreen.style.display === "none")) {
        hideTimeout = setTimeout(() => {

    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
  }

  function closeMenu() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
  }

  function closeAllSubmenus() {
    const submenus = document.querySelectorAll('.submenu');
    const buttons = document.querySelectorAll('.dropdown-btn');

    submenus.forEach(menu => menu.classList.remove('show'));
    buttons.forEach(btn => btn.classList.remove('active'));
  }

  function toggleSubmenu(button, menuId) {
    const menu = document.getElementById(menuId);
    if (!menu) return;

    const isOpen = menu.classList.contains('show');
    closeAllSubmenus();

    if (!isOpen) {
      menu.classList.add('show');
      button.classList.add('active');
    }
  }

  function toggleBrowse(button) {
    toggleSubmenu(button, 'browseMenu');
  }

  function toggleCartoons(button) {
    toggleSubmenu(button, 'cartoonMenu');
  }

  function toggleAnimeMenu(button) {
    toggleSubmenu(button, 'animeMenu');
  }

  function toggleChannels(button) {
    toggleSubmenu(button, 'channelMenu');
  }

  function toggleOtt(button) {
    toggleSubmenu(button, 'ottMenu');
  }

  function goToSearchPage() {
    window.location.href = "search.html";
  }
</script>
  
</body>
</html>
